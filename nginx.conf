# ═══════════════════════════════════════════════════════════════
#  AMtechiesPRINTER — Nginx SSL Configuration
#  File: /etc/nginx/sites-available/amtechiesprinter.com
#
#  After editing:
#    sudo ln -s /etc/nginx/sites-available/amtechiesprinter.com \
#               /etc/nginx/sites-enabled/
#    sudo nginx -t
#    sudo systemctl reload nginx
# ═══════════════════════════════════════════════════════════════

# ── Redirect HTTP → HTTPS ─────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name amtechiesprinter.com www.amtechiesprinter.com;

    # Let's Encrypt ACME challenge (keep this for cert renewal)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # All other traffic → HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── Main HTTPS Server ─────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name amtechiesprinter.com www.amtechiesprinter.com;

    # ── Document Root ─────────────────────────────────────────
    root /var/www/amtechiesprinter;
    index index.html;

    # ── SSL Certificate Paths ─────────────────────────────────
    # Option A: Let's Encrypt (recommended for production)
    ssl_certificate     /etc/letsencrypt/live/amtechiesprinter.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/amtechiesprinter.com/privkey.pem;

    # Option B: Self-signed (for testing only — uncomment if using self-signed)
    # ssl_certificate     /var/www/amtechiesprinter/ssl/server.crt;
    # ssl_certificate_key /var/www/amtechiesprinter/ssl/server.key;

    # ── SSL Protocols & Ciphers ───────────────────────────────
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_dhparam /var/www/amtechiesprinter/ssl/dhparam.pem;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;

    # ── OCSP Stapling ─────────────────────────────────────────
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # ── Security Headers ─────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://fonts.googleapis.com https://embed.tawk.to https://formsubmit.co; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com; img-src 'self' data: https:; connect-src 'self' https://formsubmit.co https://embed.tawk.to wss://ws.tawk.to; frame-src 'self' https://embed.tawk.to;" always;
    server_tokens off;

    # ── Gzip Compression ─────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/html application/javascript application/json image/svg+xml;

    # ── Static Files & Caching ────────────────────────────────
    location ~* \.(css|js|woff2|woff|ttf|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    location ~* \.(jpg|jpeg|png|gif|webp|svg)$ {
        expires 6M;
        add_header Cache-Control "public";
    }
    location ~* \.html$ {
        expires 1h;
        add_header Cache-Control "public";
    }

    # ── Admin Panel Access (IP restriction — optional) ────────
    # location /admin.html {
    #     allow 203.0.113.1;   # Your office IP
    #     deny all;
    # }

    # ── Main Routing ──────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Block Hidden Files ────────────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ── Logging ───────────────────────────────────────────────
    access_log /var/log/nginx/amtechiesprinter_access.log;
    error_log  /var/log/nginx/amtechiesprinter_error.log;
}
